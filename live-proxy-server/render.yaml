# Render.com deployment configuration
# Free tier: 512MB RAM, auto-sleep after 15min inactivity, wakes on request

services:
  - type: web
    name: maisondepriere-live
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: ADMIN_KEY
        fromGroup: maisondepriere-secrets
      - key: SUPABASE_URL
        fromGroup: maisondepriere-secrets
      - key: SUPABASE_SERVICE_KEY
        fromGroup: maisondepriere-secrets
      - key: VAPID_PUBLIC_KEY
        fromGroup: maisondepriere-secrets
      - key: VAPID_PRIVATE_KEY
        fromGroup: maisondepriere-secrets
      - key: VAPID_EMAIL
        fromGroup: maisondepriere-secrets
    healthCheckPath: /health
